name: Source Snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: regression-fix-sources
          path: |
            backend/app/tests/test_v7_4_2_reschedule_diff.py
            frontend/src/views/LearnView.test.ts
          if-no-files-found: error
