name: Publish v1.0.0

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: publish-v1.0.0
  cancel-in-progress: false

jobs:
  publish:
    name: Tag and publish stable release
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
      RELEASE_MANIFEST: docs/engineering/releases/v1.0.0.json
    steps:
      - name: Checkout exact CI-passed main commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Re-audit repository hygiene
        shell: bash
        run: |
          set -euo pipefail
          python scripts/check_repo_hygiene.py \
            --json-out "${RUNNER_TEMP}/repository-hygiene.json"

      - name: Validate release manifest
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest_path = Path(os.environ["RELEASE_MANIFEST"])
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          assert manifest["schema_version"] == 1
          assert manifest["tag"] == "v1.0.0"
          assert manifest["name"] == "Course Learning Agent v1.0.0"
          assert manifest["status"] == "ready"
          assert manifest["draft"] is False
          assert manifest["prerelease"] is False
          notes_path = Path(manifest["notes_path"])
          assert notes_path.is_file()
          assert notes_path.suffix == ".md"
          assert notes_path.read_text(encoding="utf-8").strip()
          assert os.environ["TARGET_SHA"]
          print(f"Release manifest validated for {os.environ['TARGET_SHA']}")
          PY

      - name: Create annotated tag and GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync(process.env.RELEASE_MANIFEST, 'utf8'));
            const notes = fs.readFileSync(manifest.notes_path, 'utf8');
            const targetSha = process.env.TARGET_SHA;
            const { owner, repo } = context.repo;
            const tag = manifest.tag;

            const fail = (message) => {
              core.setFailed(message);
              throw new Error(message);
            };

            let tagRef = null;
            try {
              tagRef = await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            let release = null;
            try {
              release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            if (release && !tagRef) {
              fail(`Release ${tag} exists without a tag ref.`);
            }

            if (release && tagRef) {
              core.info(`Release ${tag} already exists; no changes required.`);
              return;
            }

            if (tagRef) {
              let resolvedSha = tagRef.data.object.sha;
              if (tagRef.data.object.type === 'tag') {
                const annotated = await github.rest.git.getTag({
                  owner,
                  repo,
                  tag_sha: resolvedSha,
                });
                resolvedSha = annotated.data.object.sha;
              }
              if (resolvedSha !== targetSha) {
                fail(`Existing tag ${tag} points to ${resolvedSha}, expected ${targetSha}.`);
              }
            } else {
              const tagObject = await github.rest.git.createTag({
                owner,
                repo,
                tag,
                message: manifest.tag_message,
                object: targetSha,
                type: 'commit',
                tagger: {
                  name: 'github-actions[bot]',
                  email: '41898282+github-actions[bot]@users.noreply.github.com',
                  date: new Date().toISOString(),
                },
              });
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha: tagObject.data.sha,
              });
              core.info(`Created annotated tag ${tag} for ${targetSha}.`);
            }

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: manifest.name,
              body: notes,
              draft: manifest.draft,
              prerelease: manifest.prerelease,
              generate_release_notes: false,
              make_latest: 'true',
            });
            core.info(`Published GitHub Release ${tag}.`);

      - name: Upload release hygiene report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v1.0.0-repository-hygiene
          path: ${{ runner.temp }}/repository-hygiene.json
          if-no-files-found: error
