name: Apply P2 contract repair

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'codex/v7-5-2-close-p2-contracts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/v7-5-2-close-p2-contracts
          fetch-depth: 0

      - name: Apply deterministic patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"expected snippet not found in {path}: {old[:120]!r}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")

          Path("backend/app/services/page_asset_rebuild_contract.py").write_text('''"""Stable public contract for page-asset rebuild responses.

The rebuild service historically returned raw coverage dictionaries from a
few early-exit paths. Public API callers must receive one shape regardless
of the internal failure phase so the frontend cannot mistake readable legacy
assets for a completed repair.
"""
from __future__ import annotations

from typing import Any


_STABLE_KEYS = {"reader_state", "page_asset_rebuild", "page_catalog_backfill"}


def normalize_page_asset_rebuild_result(
    material_id: int,
    result: dict[str, Any],
) -> dict[str, Any]:
    """Return the stable rebuild contract for both new and legacy results."""
    normalized = dict(result)
    normalized.setdefault("material_id", material_id)

    if _STABLE_KEYS.issubset(normalized):
        normalized.setdefault("error_code", None)
        return normalized

    raw_status = str(normalized.get("status") or "failed")
    ready_pages = max(int(normalized.get("ready_pages") or 0), 0)
    expected_pages = max(int(normalized.get("expected_pages") or 0), ready_pages)
    raw_missing = normalized.get("missing_pages")
    missing_pages = max(
        int(raw_missing) if raw_missing is not None else expected_pages - ready_pages,
        0,
    )

    readable = ready_pages > 0
    if raw_status == "busy":
        asset_status = "skipped"
        error_code = "PAGE_ASSET_REBUILD_BUSY"
    elif raw_status == "not_applicable":
        asset_status = "skipped"
        error_code = "PAGE_ASSET_REBUILD_NOT_APPLICABLE"
    elif raw_status in {"ready", "partial"}:
        asset_status = "failed"
        error_code = "PAGE_ASSET_REBUILD_INCOMPLETE"
    else:
        asset_status = "failed"
        error_code = "PAGE_ASSET_REBUILD_FAILED"

    return {
        **normalized,
        "material_id": material_id,
        "status": "readable_but_not_repaired" if readable else "failed",
        "reader_state": "synthetic_fallback" if readable else "unavailable",
        "expected_pages": expected_pages,
        "ready_pages": ready_pages,
        "missing_pages": missing_pages,
        "page_asset_rebuild": {"status": asset_status},
        "page_catalog_backfill": {
            "status": "skipped",
            "created": 0,
            "remaining_synthetic_page_numbers": list(
                normalized.get("synthetic_page_numbers") or []
            ),
        },
        "error_code": error_code,
    }
''', encoding="utf-8")

          replace(
              "backend/app/api/v1/endpoints/parse.py",
              "from app.services.material_identity_service import resolve_owned_material\n",
              "from app.services.material_identity_service import resolve_owned_material\nfrom app.services.page_asset_rebuild_contract import normalize_page_asset_rebuild_result\n",
          )
          replace(
              "backend/app/api/v1/endpoints/parse.py",
              "    inject_failure = settings.E2E_MODE and x_e2e_inject_page_backfill_failure == \"true\"\n    return rebuild_page_assets(db, material, inject_backfill_failure=inject_failure)\n",
              "    inject_failure = settings.E2E_MODE and x_e2e_inject_page_backfill_failure == \"true\"\n    result = rebuild_page_assets(db, material, inject_backfill_failure=inject_failure)\n    return normalize_page_asset_rebuild_result(material.id, result)\n",
          )

          replace(
              "backend/app/schemas/chunk.py",
              "    material_id: int\n    material_name: str = \"\"\n",
              "    material_id: int\n    material_public_id: str\n    material_name: str = \"\"\n",
          )
          replace(
              "backend/app/api/v1/endpoints/chunks.py",
              "        material_id=chunk.material_id,\n        material_name=material.filename,\n",
              "        material_id=chunk.material_id,\n        material_public_id=material.public_id,\n        material_name=material.filename,\n",
          )
          replace(
              "backend/app/tests/test_chunks.py",
              "- Response includes chunk_id, material_id, material_name, title, page_no, text\n",
              "- Response includes chunk_id, material_id, material_public_id, material_name, title, page_no, text\n",
          )
          replace(
              "backend/app/tests/test_chunks.py",
              "    assert \"material_id\" in body\n    assert \"material_name\" in body\n",
              "    assert \"material_id\" in body\n    assert body[\"material_public_id\"]\n    assert len(body[\"material_public_id\"]) == 36\n    assert \"material_name\" in body\n",
          )

          replace(
              "frontend/src/api/material.ts",
              "  material_id: number\n  material_name: string\n",
              "  material_id: number\n  material_public_id?: string | null\n  material_name: string\n",
          )
          replace(
              "frontend/src/components/chat/EvidenceDrawer.vue",
              "import { computed } from 'vue'\nimport { useRouter } from 'vue-router'\nimport type { Citation } from '../../api/chat'\nimport type { ChunkDetail } from '../../api/material'\n",
              "import { computed } from 'vue'\nimport { ElMessage } from 'element-plus'\nimport { useRouter } from 'vue-router'\nimport type { Citation } from '../../api/chat'\nimport { getChunk, type ChunkDetail } from '../../api/material'\n",
          )
          replace(
              "frontend/src/components/chat/EvidenceDrawer.vue",
              "function goToLearn(chunkId: number, materialPublicId?: string | null) {\n  if (props.message?.courseId) {\n    router.push({\n      path: `/courses/${props.message.courseId}/learn`,\n      query: {\n        ...(materialPublicId ? { material: materialPublicId } : {}),\n        chunk_id: String(chunkId),\n      },\n    })\n    emit('update:visible', false)\n  }\n}\n",
              "async function goToLearn(chunkId: number, materialPublicId?: string | null) {\n  if (!props.message?.courseId) return\n\n  let resolvedPublicId = materialPublicId\n  if (!resolvedPublicId) {\n    try {\n      const { data } = await getChunk(chunkId)\n      resolvedPublicId = data.material_public_id\n    } catch {\n      ElMessage.error('无法定位该片段所属资料，请刷新后重试。')\n      return\n    }\n  }\n  if (!resolvedPublicId) {\n    ElMessage.error('该片段缺少稳定资料标识，暂时无法打开。')\n    return\n  }\n\n  await router.push({\n    path: `/courses/${props.message.courseId}/learn`,\n    query: { material: resolvedPublicId, chunk_id: String(chunkId) },\n  })\n  emit('update:visible', false)\n}\n",
          )
          replace(
              "frontend/src/components/chat/EvidenceDrawer.vue",
              "            :disabled=\"!props.citation.material_public_id\"\n            @click=\"goToLearn(props.citation.chunk_id, props.citation.material_public_id)\"\n",
              "            @click=\"goToLearn(props.citation.chunk_id, props.citation.material_public_id)\"\n",
          )
          replace(
              "frontend/src/components/chat/EvidenceDrawer.vue",
              "            旧引用缺少稳定资料标识，暂不能直接跳转\n",
              "            将根据引用片段解析所属资料\n",
          )

          Path("backend/app/tests/test_v7_5_2_page_rebuild_contract.py").write_text('''"""Regression tests for the stable page rebuild API contract."""
from app.services.page_asset_rebuild_contract import normalize_page_asset_rebuild_result


def test_existing_stable_contract_is_preserved() -> None:
    original = {
        "material_id": 3,
        "status": "ready",
        "reader_state": "fully_repaired",
        "expected_pages": 2,
        "ready_pages": 2,
        "missing_pages": 0,
        "page_asset_rebuild": {"status": "success"},
        "page_catalog_backfill": {
            "status": "success",
            "created": 2,
            "remaining_synthetic_page_numbers": [],
        },
        "error_code": None,
    }
    assert normalize_page_asset_rebuild_result(3, original) == original


def test_legacy_partial_coverage_is_not_reported_as_success() -> None:
    result = normalize_page_asset_rebuild_result(7, {
        "status": "partial",
        "expected_pages": 3,
        "ready_pages": 2,
        "missing_pages": 1,
        "synthetic_page_numbers": [3],
    })
    assert result["status"] == "readable_but_not_repaired"
    assert result["reader_state"] == "synthetic_fallback"
    assert result["page_asset_rebuild"]["status"] == "failed"
    assert result["page_catalog_backfill"]["status"] == "skipped"
    assert result["page_catalog_backfill"]["remaining_synthetic_page_numbers"] == [3]
    assert result["error_code"] == "PAGE_ASSET_REBUILD_INCOMPLETE"


def test_busy_legacy_result_uses_same_contract() -> None:
    result = normalize_page_asset_rebuild_result(11, {
        "status": "busy",
        "expected_pages": 0,
        "ready_pages": 0,
        "missing_pages": 0,
    })
    assert result["status"] == "failed"
    assert result["reader_state"] == "unavailable"
    assert result["page_asset_rebuild"]["status"] == "skipped"
    assert result["error_code"] == "PAGE_ASSET_REBUILD_BUSY"
''', encoding="utf-8")
          PY

      - name: Validate patched files
        shell: bash
        run: |
          python -m compileall -q backend/app/services/page_asset_rebuild_contract.py backend/app/api/v1/endpoints/parse.py backend/app/api/v1/endpoints/chunks.py backend/app/schemas/chunk.py
          grep -q 'material_public_id=material.public_id' backend/app/api/v1/endpoints/chunks.py
          grep -q 'await getChunk(chunkId)' frontend/src/components/chat/EvidenceDrawer.vue

      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend frontend
          git commit -m "fix(v7.5.2): close remaining P2 contracts"
          git push origin HEAD:codex/v7-5-2-close-p2-contracts
