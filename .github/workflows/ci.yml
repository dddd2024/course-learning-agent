name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      LLM_PROVIDER: mock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run pytest
        run: |
          cd backend
          python -m pytest app/tests/ -v 2>&1 | tee ../backend-test-result.txt

      - name: Upload backend test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-result
          path: backend-test-result.txt

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build 2>&1 | tee ../frontend-build-result.txt

      - name: Upload frontend build result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-result
          path: frontend-build-result.txt

  acceptance:
    name: Acceptance Script
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        run: python -m pip install -r backend/requirements.txt

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Run acceptance script
        env:
          LLM_PROVIDER: mock
        run: |
          bash ./scripts/verify_phase2_engineering.sh 2>&1 | tee acceptance-result.txt

      - name: Upload acceptance result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-result
          path: acceptance-result.txt
